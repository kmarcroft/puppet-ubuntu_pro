---
plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  DisplayCopNames: true
  TargetRubyVersion: 3.2
  NewCops: enable
  Include:
    - 'lib/**/*.rb'
    - 'spec/**/*.rb'
  Exclude:
    - 'bin/*'
    - 'pkg/**/*'
    - 'spec/fixtures/**/*'
    - 'vendor/**/*'

# Puppet provider/type files tend to be longer
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*.rb'
    - 'lib/puppet/type/**/*.rb'
    - 'lib/puppet/provider/**/*.rb'

Metrics/MethodLength:
  Max: 20

# Puppet DSL style
Style/Documentation:
  Enabled: false

Style/SymbolArray:
  EnforcedStyle: brackets

# Puppet type/provider API requires these method names
Naming/PredicatePrefix:
  Exclude:
    - 'lib/puppet/type/**/*.rb'

# Puppet types use top-level DSL blocks, not classes
RSpec/DescribeClass:
  Exclude:
    - 'spec/unit/**/*.rb'
    - 'spec/classes/**/*.rb'
    - 'spec/defines/**/*.rb'

RSpec/ExampleLength:
  Max: 10

RSpec/MultipleExpectations:
  Max: 3

RSpec/NestedGroups:
  Max: 4

# Spec files commonly use top-level include for RspecPuppetFacts
Style/MixinUsage:
  Exclude:
    - 'spec/spec_helper.rb'
